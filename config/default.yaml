ranks:
  labels: ["A", "B", "C"]
  order: descending  # A が最良

reward_model:
  algorithm: mord_logistic_at
  regularization: 1.0

surrogate_model:
  kernel: matern
  nu: 2.5
  noise_variance: 0.01
  n_restarts: 5
  training_iterations: 100

acquisition:
  function: ucb
  kappa: 2.0

optimizer:
  method: differential_evolution
  max_iter: 1000
  popsize: 15
  seed: 42
